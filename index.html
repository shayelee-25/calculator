<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="header">
            <div class="title">
                <p>Calculator</p>
            </div>
        </div>
        <div id="calculatorContainer">
            <div id="row5" class="display">
                <div class="display total">19379</div>
            </div>

            <button id="row4" class="clear">clear</button>

            <div id="row3">
                <button id="number" class="7">7</button>
                <button id="number" class="8">8</button>
                <button id="number" class="9">9</button>
                <button id="operant" class="divide">÷</button>
            </div>

            <div id="row2">
                <button id="number" class="4">4</button>
                <button id="number" class="5">5</button>
                <button id="number" class="6">6</button> 
                <button id="operant" class="multiply">×</button>
            </div>

            <div id="row1">
                <button id="number" class="1">1</button>
                <button id="number" class="2">2</button>
                <button id="number" class="3">3</button>
                <button id="operant" class="subtract">-</button>
            </div>

            <div id="row0">
                <button id="number" class="0">0</button>
                <button id="number" class="00">00</button>
                <button id="operant" class="equal">=</button>
                <button id="operant" class="add">+</button>
            </div>
        </div>




        <script src="script.js"></script>
    </body>

</html>
